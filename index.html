<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="stlyle.css">
</head>
<body>

    <div id="quiz-container">
    <div id="question-box">
        <button id="fifty">50/50 (4)</button>
        <h2 id="level"></h2>
        <h2 id="question"></h2>
    </div>
    <div id="answers-grid">
        <button class="answer" id="btn-a"><span>A:</span> <span class="answer-text"></span></button>
        <button class="answer" id="btn-b"><span>B:</span> <span class="answer-text"></span></button>
        <button class="answer" id="btn-c"><span>C:</span> <span class="answer-text"></span></button>
        <button class="answer" id="btn-d"><span>D:</span> <span class="answer-text"></span></button>
    </div>
    <p id="otgovor"></p>
    <audio id="music" src="music.mp3" autoplay loop></audio>
    <audio id="correct" src="correct.mp3"></audio>
    <audio id="wrong" src="wrong.mp3"></audio>
</div>



    <script src="index.js" charset="utf-8"></script>
</body>
</html>
